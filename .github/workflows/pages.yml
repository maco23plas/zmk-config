name: Deploy ANTAI site to GitHub Pages

# docs/ 配下（ANTAIサイト）の変更時に GitHub Pages へ自動デプロイします。
# 利用するには 1度だけ: リポジトリ Settings > Pages > Build and deployment >
#   Source を「GitHub Actions」に設定してください。

on:
  push:
    branches: ["main", "claude/clever-wozniak-igtexv"]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
